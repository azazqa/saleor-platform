name: test-platform
on: pull_request

jobs:
  verify_pull_request:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Check project sources
        run: |
          test -f saleor/Dockerfile || (echo "saleor/ not found — clone your fork before running CI" && exit 1)
      - name: Build
        run: docker compose build
      - name: Run backend tests
        run: docker compose run api pytest -n logical --allow-hosts cache
