x-saleor-build: &saleor-build
  context: ./saleor
  dockerfile: Dockerfile
  args:
    STATIC_URL: /static/

services:
  api:
    build: *saleor-build
    image: saleor-platform-saleor
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    stdin_open: true
    tty: true
    depends_on:
      - db
      - cache
      - jaeger
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media
    env_file:
      - common.env
      - backend.env
    environment:
      - DASHBOARD_URL=https://saleor-dashboard.klms.co.kr/dashboard/
      - STOREFRONT_URL=https://saleor.klms.co.kr/
      - ALLOWED_HOSTS=localhost,127.0.0.1,api,saleor-api.klms.co.kr,saleor-dashboard.klms.co.kr,tosspayments.klms.co.kr
      # 로컬 개발: False / 운영: True (웹훅·절대 URL의 http/https 스킴 결정)
      - ENABLE_SSL=True

  dashboard:
    build:
      context: ./saleor-dashboard
      dockerfile: Dockerfile
      args:
        API_URL: https://saleor.klms.co.kr/graphql/
        APP_MOUNT_URI: /dashboard/
        STATIC_URL: /dashboard/
    image: saleor-platform-dashboard
    ports:
      - 9000:80
    restart: unless-stopped
    environment:
      - API_URL=https://saleor.klms.co.kr/graphql/
      - APP_MOUNT_URI=/dashboard/

  db:
    image: library/postgres:15-alpine
    ports:
      - 5432:5432
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-db:/var/lib/postgresql/data
      - ./replica_user.sql:/docker-entrypoint-initdb.d/replica_user.sql:ro,z
    environment:
      - POSTGRES_USER=saleor
      - POSTGRES_PASSWORD=saleor

  cache:
    image: valkey/valkey:9.1-alpine
    ports:
      - 6379:6379
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - saleor-cache:/data

  worker:
    build: *saleor-build
    image: saleor-platform-saleor
    command: celery -A saleor --app=saleor.celeryconf:app worker --loglevel=info -B
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    env_file:
      - common.env
      - backend.env
    environment:
      # 로컬 개발: False / 운영: True (api와 동일하게 맞출 것)
      - ENABLE_SSL=True
    depends_on:
      - api
      - cache
      - mailpit
    volumes:
      # shared volume between worker and api for media
      - saleor-media:/app/media

  jaeger:
    image: jaegertracing/jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - saleor-backend-tier
    volumes:
      - type: tmpfs
        target: /tmp

  mailpit:
    image: axllent/mailpit
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui. Visit http://localhost:8025/ to check emails
    restart: unless-stopped
    networks:
      - saleor-backend-tier

volumes:
  saleor-db:
    driver: local
  saleor-cache:
    driver: local
  saleor-media:

networks:
  saleor-backend-tier:
    driver: bridge
